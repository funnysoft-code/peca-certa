# Retired: covered by .github/workflows/ci.yml (Test + Browser Test jobs).
# Kept as workflow_dispatch-only so old bookmarks/docs do not 404.
name: tests

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    runs-on: blacksmith-2vcpu-ubuntu-2404-arm
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup

      - name: Copy Environment File
        run: cp .env.example .env

      - name: Generate Application Key
        run: php artisan key:generate

      - name: Build Assets
        run: bun run build

      - name: Static analysis
        run: composer test:types

      - name: Tests
        run: php artisan test --parallel --compact --exclude-testsuite=Browser
