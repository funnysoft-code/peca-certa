# Retired: covered by .github/workflows/ci.yml (Rector, Pint, Lint & Format).
# Kept as workflow_dispatch-only so old bookmarks/docs do not 404.
name: linter

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: blacksmith-2vcpu-ubuntu-2404-arm
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup

      - name: Generate Wayfinder
        run: php artisan wayfinder:generate --with-form

      - name: Rector (dry-run)
        run: vendor/bin/rector --dry-run --ansi

      - name: Pint
        run: vendor/bin/pint --test --ansi

      - name: Frontend lint
        run: bun run test:lint
