name: linter

on:
  push:
    branches:
      - develop
      - main
      - master
  pull_request:
    branches:
      - develop
      - main
      - master

permissions:
  contents: read

jobs:
  quality:
    runs-on: blacksmith-2vcpu-ubuntu-2404-arm
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup

      - name: Rector (dry-run)
        run: vendor/bin/rector --dry-run --ansi

      - name: Pint
        run: vendor/bin/pint --test --ansi

      - name: Frontend lint
        run: bun run test:lint
