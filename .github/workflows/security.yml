name: Security

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    # Weekly on Monday at midnight UTC
    - cron: '0 0 * * 1'
  workflow_dispatch:
  pull_request:
    paths:
      - 'composer.lock'
      - 'bun.lock'

permissions:
  contents: read

jobs:
  audit:
    name: Audit
    runs-on: blacksmith-2vcpu-ubuntu-2404-arm
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - name: PHP Security Audit
        run: composer audit

      - name: JS Security Audit
        run: bun audit
