# lefthook.yml — reference config (NOT the active git hook runner in this repo).
#
# This project uses vite-plus git hooks via:
#   git config core.hooksPath → .vite-hooks/_
# Active scripts live in `.vite-hooks/pre-commit`, `pre-push`, `commit-msg`.
#
# Do not switch core.hooksPath to lefthook without removing the vite-plus hooks.
# Harness enforcement (Claude / Cursor / Grok) is separate:
#   .claude/hooks/require-quality-gate-before-push.sh
